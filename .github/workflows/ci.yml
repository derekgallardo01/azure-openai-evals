name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Validate every bundled deployment
        run: |
          for d in deployments/*.json; do
            name=$(basename "$d" .json)
            aoai-evals validate "$name"
          done

      - name: Run eval suite for every bundled deployment
        run: aoai-evals demo

      - name: Smoke check the CLI
        run: |
          aoai-evals list
          aoai-evals show gpt4o-eastus-prod
          aoai-evals cost gpt4o-mini-bulk --calls 100000 --in 200 --out 30
          aoai-evals latency gpt4o-eastus-prod --samples 20
